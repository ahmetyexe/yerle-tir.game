<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Neon Tetris PWA</title>
    <meta name="description" content="Premium Neon-Pastel Tetris Experience" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0b10" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- SVG Sprite -->
    <svg style="display: none;">
      <symbol id="icon-left" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></symbol>
      <symbol id="icon-right" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
      <symbol id="icon-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>
      <symbol id="icon-rotate" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></symbol>
      <symbol id="icon-hard-drop" viewBox="0 0 24 24"><path d="M12 2v14"/><path d="m19 9-7 7-7-7"/><path d="M5 22h14"/></symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24"><rect width="4" height="16" x="6" y="4" rx="1"/><rect width="4" height="16" x="14" y="4" rx="1"/></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24"><path d="m7 3 14 9-14 9V3z"/></symbol>
      <symbol id="icon-sound-on" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></symbol>
      <symbol id="icon-sound-off" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></symbol>
      <symbol id="icon-music-on" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
      <symbol id="icon-music-off" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><line x1="2" y1="2" x2="22" y2="22" stroke-width="2"/></symbol>
    </svg>

    <div id="start-screen" class="menu-overlay">
      <div class="title-neon">
        <span class="blue-glow">NEON</span>
        <span class="purple-glow">TETRIS</span>
      </div>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 1rem;">Premium Neon-Pastel Experience</p>
      <div class="glass-panel" style="margin-bottom: 1.5rem; padding: 0.75rem 1.5rem; text-align: center;">
        <span class="label">Best Score</span>
        <span id="start-best-score" class="value" style="color: var(--color-l); font-size: 1.5rem;">0</span>
      </div>
      <button id="start-btn" class="menu-btn">Start Game</button>
    </div>

    <div class="game-container">
      <div class="header-stats">
        <div class="stat-column">
          <div class="glass-panel">
            <span class="label">Hold</span>
            <canvas id="hold-preview" width="60" height="60"></canvas>
          </div>
          <div class="glass-panel">
            <span class="label">Score</span>
            <span id="score-val" class="value" style="color: var(--color-i)">0</span>
          </div>
          <div class="glass-panel">
            <span class="label">Best</span>
            <span id="best-score-val" class="value" style="color: var(--color-l); font-size: 0.9rem;">0</span>
          </div>
        </div>

        <div class="canvas-wrapper">
          <canvas id="game-canvas"></canvas>
          
          <div id="pause-overlay" class="overlay">
            <h2 class="blue-glow">PAUSED</h2>
            <div class="audio-toggles" style="margin-bottom: 1rem;">
              <button id="sfx-toggle" class="glass-panel audio-btn" title="Ses Efektleri">
                <svg style="width: 22px; height: 22px; stroke: white; fill: none;"><use href="#icon-sound-on"></use></svg>
                <span class="audio-label">SFX</span>
              </button>
              <button id="bgm-toggle" class="glass-panel audio-btn" title="Müzik">
                <svg style="width: 22px; height: 22px; stroke: white; fill: none;"><use href="#icon-music-on"></use></svg>
                <span class="audio-label">BGM</span>
              </button>
            </div>
            <button id="resume-btn" class="menu-btn" style="font-size: 1rem;">Resume</button>
          </div>

          <div id="game-over-overlay" class="overlay">
            <h2 style="color: var(--color-z)">GAME OVER</h2>
            <div class="label">Final Score</div>
            <div id="final-score" class="value" style="margin-bottom: 1.5rem;">0</div>
            <div class="label">Best Score</div>
            <div id="best-score" class="value" style="margin-bottom: 1.5rem; color: var(--color-l);">0</div>
            <button id="restart-btn" class="menu-btn" style="font-size: 1rem;">Try Again</button>
          </div>
        </div>

        <div class="stat-column">
          <div class="glass-panel">
            <span class="label">Next</span>
            <canvas id="next-preview" width="60" height="60"></canvas>
          </div>
          <div class="glass-panel">
            <span class="label">Level</span>
            <span id="level-val" class="value" style="color: var(--color-t)">1</span>
          </div>
          <button id="pause-toggle" class="glass-panel" style="cursor: pointer; padding: 0.5rem;">
            <svg style="width: 24px; height: 24px; stroke: white; fill: none;"><use href="#icon-pause"></use></svg>
          </button>
        </div>
      </div>


      <div class="controls">
        <button id="btn-left" class="control-btn"><svg><use href="#icon-left"></use></svg></button>
        <button id="btn-right" class="control-btn"><svg><use href="#icon-right"></use></svg></button>
        <button id="btn-down" class="control-btn"><svg><use href="#icon-down"></use></svg></button>
        <button id="btn-hard-drop" class="control-btn btn-large"><svg><use href="#icon-hard-drop"></use></svg></button>
        <button id="btn-hold" class="control-btn"><span style="font-size: 10px; font-weight: bold; color: var(--color-l)">HOLD</span></button>
        <button id="btn-rotate" class="control-btn btn-large"><svg><use href="#icon-rotate"></use></svg></button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
